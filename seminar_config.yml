# 次回勉強会の開催日（YYYY-MM-DD）
# /add-seminar-session の date 引数を省略したときに使用される
next_seminar_date: 2026-04-26

# デフォルト発表者名
# 解説記事・スライドの「担当:」欄に自動挿入される
default_presenter: 駒月柊平

# PDFソース登録（/extract-pdf-pages で使用するキー→絶対パスのマッピング）
# キーは英小文字・数字・ハイフンのみ使用推奨
# 例:
#   pdf_sources:
#     dl-book: /Users/yourname/books/deep_learning.pdf
#     transformer-paper: /Users/yourname/papers/attention.pdf
pdf_sources: {}

# /extract-pdf-pages のデフォルト出力ディレクトリ（プロジェクトルートからの相対パス）
pdf_output_dir: pdfs
